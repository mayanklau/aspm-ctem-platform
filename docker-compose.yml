name: aspm-ctem

services:
  # ──────────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-aspm_db}
      MYSQL_USER: ${DB_USER:-aspm}
      MYSQL_PASSWORD: ${DB_PASS:-changeme}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
    volumes:
      - mysql-data:/var/lib/mysql
    networks: [aspm-net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./aspm-v3/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-aspm_db}
      DB_USER: ${DB_USER:-aspm}
      DB_PASS: ${DB_PASS:-changeme}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in your .env or environment}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/logs
      UPLOAD_DIR: /app/uploads
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    networks: [aspm-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/livez"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./aspm-v3/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4200}:8080"
    networks: [aspm-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mysql-data:
  backend-uploads:
  backend-logs:

networks:
  aspm-net:
    driver: bridge
