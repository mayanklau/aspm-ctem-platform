server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"        always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header Referrer-Policy           "no-referrer"       always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ── Compression ─────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml font/ttf font/otf font/woff font/woff2;

    # ── Long-cache hashed Angular assets ────────────────────────────────────
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|gif|png|jpe?g|webp|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → backend service ─────────────────────────────────────────
    # The backend hostname is resolvable inside docker compose by service name.
    location /api/ {
        proxy_pass         http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-Id      $request_id;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Health proxy (handy for k8s probes if you front the SPA) ───────────
    location = /api/healthz {
        proxy_pass http://backend:3001/healthz;
    }

    # ── Angular SPA fallback ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide nginx version
    server_tokens off;

    # Disable directory listing
    autoindex off;

    # Reasonable client body cap (uploads go to /api which is proxied)
    client_max_body_size 60m;
}
