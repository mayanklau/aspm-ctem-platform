<div class="table-responsive">
  <table class="table table-hover table-sm findings-table mb-0">
    <thead class="thead-dark"><tr><th *ngFor="let c of columns">{{c.label}}</th><th>Status</th></tr></thead>
    <tbody>
      <tr *ngFor="let row of findings" (click)="rowClick.emit(row)" class="clickable">
        <td *ngFor="let c of columns">
          <span *ngIf="c.key==='severity'" class="badge" [ngClass]="sevClass(get(row,c.key))">{{get(row,c.key)}}</span>
          <span *ngIf="c.key!=='severity'" [title]="get(row,c.key)">{{get(row,c.key)}}</span>
        </td>
        <td><select class="form-control form-control-sm status-select" [(ngModel)]="row.status" (change)="statusChange.emit({id:row.id,status:row.status})" (click)="$event.stopPropagation()">
          <option value="open">Open</option><option value="in_progress">In Progress</option><option value="resolved">Resolved</option><option value="accepted_risk">Accepted Risk</option><option value="false_positive">False Positive</option>
        </select></td>
      </tr>
      <tr *ngIf="!findings.length&&!loading"><td [attr.colspan]="columns.length+1" class="text-center text-muted py-4">No records found.</td></tr>
      <tr *ngIf="loading"><td [attr.colspan]="columns.length+1" class="text-center py-3"><i class="fa fa-spinner fa-spin mr-2"></i>Loading...</td></tr>
    </tbody>
  </table>
</div>
<div class="table-pagination" *ngIf="total > limit">
  <button class="btn btn-sm btn-outline-secondary" [disabled]="page<=1" (click)="pageChange.emit(page-1)"><i class="fa fa-chevron-left"></i></button>
  <button class="btn btn-sm" *ngFor="let p of pages" [ngClass]="p===page?'btn-primary':'btn-outline-secondary'" (click)="pageChange.emit(p)">{{p}}</button>
  <button class="btn btn-sm btn-outline-secondary" [disabled]="page>=pages[pages.length-1]" (click)="pageChange.emit(page+1)"><i class="fa fa-chevron-right"></i></button>
  <span class="text-muted small ml-2">{{total}} total</span>
</div>
