name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend lint, test, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aspm-v3/backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: aspm_db
          MYSQL_USER: aspm
          MYSQL_PASSWORD: aspmpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: aspm_db
      DB_USER: aspm
      DB_PASS: aspmpass
      JWT_SECRET: ci-only-not-a-real-secret-1234567890

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aspm-v3/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production audit (high+critical only, non-blocking on advisories without fixes)
        run: npm audit --omit=dev --audit-level=high || echo "::warning::npm audit reported issues"

  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aspm-v3/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aspm-v3/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Production build
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: aspm-v3/backend
          push: false
          tags: aspm-ctem/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: aspm-v3/frontend
          push: false
          tags: aspm-ctem/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
